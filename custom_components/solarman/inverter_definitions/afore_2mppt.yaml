#
# Afore BNT-TL T6 | 2 MPPT
#
# Reference: https://github.com/user-attachments/files/17139137/211208.-.Afore.T6.communication.protocol.V1.0-211109.xlsx
#
# For older models of BNTxxxKTL profile w/ T4 protocol is needed
# To use modbus function in Afore BNTxxxKTL inverters, You first need to change protocol from RS485 to MODBUS in inverter menu
#
# Tested with Afore ATON BNT004KTL inverter w/ serial number starting from T6
#

default:
  update_interval: 5
  code: 0x04
  digits: 6

parameters:
  - group: PV
    items:
      - name: PV Power
        alt: DC Power
        description: Combined power of all PV inputs
        class: "power"
        state_class: "measurement"
        uom: "W"
        scale: 1
        rule: 1
        registers: [0x022A, 0x0229]
        icon: "mdi:home-lightning-bolt"

      - name: "PV1 Power"
        alt: DC1 Power
        mppt: 1
        class: "power"
        state_class: "measurement"
        uom: "W"
        rule: 1
        digits: 3
        scale: 1
        registers: [0x022D]
        icon: "mdi:solar-power-variant"

      - name: "PV1 Voltage"
        alt: DC1 Voltage
        mppt: 1
        class: "voltage"
        state_class: "measurement"
        uom: "V"
        scale: 0.1
        rule: 1
        registers: [0x022B]
        icon: "mdi:solar-power"

      - name: "PV1 Current"
        alt: DC1 Current
        mppt: 1
        class: "current"
        state_class: "measurement"
        uom: "A"
        scale: 0.01
        rule: 1
        registers: [0x022C]
        icon: "mdi:solar-power"

      - name: "PV2 Power"
        alt: DC2 Power
        mppt: 2
        class: "power"
        state_class: "measurement"
        uom: "W"
        rule: 1
        digits: 3
        scale: 1
        registers: [0x0230]
        icon: "mdi:solar-power-variant"

      - name: "PV2 Voltage"
        alt: DC2 Voltage
        mppt: 2
        class: "voltage"
        state_class: "measurement"
        uom: "V"
        scale: 0.1
        rule: 1
        registers: [0x022E]
        icon: "mdi:solar-power"

      - name: "PV2 Current"
        alt: DC2 Current
        mppt: 2
        class: "current"
        state_class: "measurement"
        uom: "A"
        scale: 0.01
        rule: 1
        registers: [0x022F]
        icon: "mdi:solar-power"

      - name: "Today Production"
        friendly_name: Today's Production
        class: "energy"
        state_class: "total_increasing"
        uom: "kWh"
        scale: 0.1
        suggested_display_precision: 1
        rule: 1
        registers: [0x03E8]
        icon: "mdi:solar-power"
        validation:
          dev: 100
          invalidate_all:

      - name: "Total Production"
        persistent:
        class: "energy"
        state_class: "total_increasing"
        uom: "kWh"
        scale: 0.1
        suggested_display_precision: 1
        rule: 1
        registers: [0x03F7, 0x03F6]
        icon: "mdi:solar-power"
        validation:
          min: 0.1
          dev: 100
          invalidate_all: 2

      - name: "Reactive Power"
        alt: Qinv
        class: "reactive_power"
        state_class: "measurement"
        uom: "var"
        scale: 1
        rule: 2
        registers: [0x020D, 0x020C]
        icon: "mdi:sine-wave"

      - name: "Apparent Power"
        alt: Sinv
        class: "apparent_power"
        state_class: "measurement"
        uom: "VA"
        scale: 1
        rule: 2
        registers: [0x0210, 0x020F]
        icon: "mdi:flash-outline"

      - name: "Reactive Power"
        alt: Qinv
        class: "reactive_power"
        state_class: "measurement"
        uom: "var"
        scale: 1
        rule: 2
        registers: [0x020D, 0x020C]
        icon: "mdi:sine-wave"

      - name: "Apparent Power"
        alt: Sinv
        class: "apparent_power"
        state_class: "measurement"
        uom: "VA"
        scale: 1
        rule: 1
        registers: [0x0210, 0x020F]
        icon: "mdi:flash-outline"

      - name: "Power Factor"
        alt: PFinv
        state_class: "measurement"
        uom: ""
        scale: 0.001
        rule: 2
        registers: [0x020E]

  - group: Output
    items:
      - name: "L1 Voltage"
        l: 1
        class: "voltage"
        state_class: "measurement"
        uom: "V"
        scale: 0.1
        rule: 1
        registers: [0x01FB]

      - name: "L2 Voltage"
        l: 2
        class: "voltage"
        state_class: "measurement"
        uom: "V"
        scale: 0.1
        rule: 1
        registers: [0x01FC]

      - name: "L3 Voltage"
        l: 3
        class: "voltage"
        state_class: "measurement"
        uom: "V"
        scale: 0.1
        rule: 1
        registers: [0x01FD]

      - name: "L1 Current"
        l: 1
        class: "current"
        state_class: "measurement"
        uom: "A"
        scale: 0.01
        rule: 2
        registers: [0x01FE]

      - name: "L2 Current"
        l: 2
        class: "current"
        state_class: "measurement"
        uom: "A"
        scale: 0.01
        rule: 2
        registers: [0x01FF]

      - name: "L3 Current"
        l: 3
        class: "current"
        state_class: "measurement"
        uom: "A"
        scale: 0.01
        rule: 2
        registers: [0x0200]

      - name: "L1 Active Power"
        alt: PinvR
        l: 1
        class: "power"
        state_class: "measurement"
        uom: "W"
        scale: 1
        rule: 2
        registers: [0x0205, 0x0204]

      - name: "L2 Active Power"
        alt: PinvS
        l: 2
        class: "power"
        state_class: "measurement"
        uom: "W"
        scale: 1
        rule: 2
        registers: [0x0207, 0x0206]

      - name: "L3 Active Power"
        alt: PinvT
        l: 3
        class: "power"
        state_class: "measurement"
        uom: "W"
        scale: 1
        rule: 2
        registers: [0x0209, 0x0208]

      - name: "L1 Frequency"
        l: 1
        class: "frequency"
        state_class: "measurement"
        uom: "Hz"
        scale: 0.01
        rule: 1
        registers: [0x0201]

      - name: "L2 Frequency"
        l: 2
        class: "frequency"
        state_class: "measurement"
        uom: "Hz"
        scale: 0.01
        rule: 1
        registers: [0x0202]

      - name: "L3 Frequency"
        l: 3
        class: "frequency"
        state_class: "measurement"
        uom: "Hz"
        scale: 0.01
        rule: 1
        registers: [0x0203]

      - name: "Temperature"
        alt: Tinner
        class: "temperature"
        uom: "°C"
        scale: 0.1
        rule: 2
        registers: [0x09D2]
        icon: "mdi:thermometer"

      - name: "DC Temperature"
        alt: Ttransf
        class: "temperature"
        state_class: "measurement"
        uom: "°C"
        scale: 0.1
        rule: 2
        registers: [0x09D3]
        icon: "mdi:thermometer"

      - name: "Power"
        alt: Pinv
        class: "power"
        state_class: "measurement"
        uom: "W"
        scale: 1
        rule: 2
        registers: [0x020B, 0x020A]
        icon: "mdi:home-lightning-bolt"

      - name: "Power losses"
        description: Includes consumption of the inverter device itself as well AC/DC conversion losses
        class: "power"
        state_class: "measurement"
        uom: "W"
        rule: 1
        digits: 0
        uint: enforce
        sensors:
          - registers: [0x022A, 0x0229]
          - operator: subtract
            signed:
            registers: [0x020B, 0x020A]

      - name: "Device State"
        alt: RunState
        rule: 1
        registers: [0x09C4]
        icon: "mdi:state-machine"
        lookup:
          - key: 0
            value: "Init"
          - key: 1
            value: "Standby"
          - key: 2
            value: "Startup"
          - key: 3
            value: "Grid"
          - key: 4
            value: "Grid disconnected"
          - key: 5
            value: "Generator"
          - key: 6
            value: "Off grid"
          - key: 7
            value: "On grid"
          - key: 8
            value: "Shutdown"
          - key: 9
            value: "Off"
          - key: 10
            value: "Error"
          - key: 11
            value: "Update"
          - key: 12
            value: "Aging"
          - key: 13
            value: "Open loop"
          - key: 14
            value: "Sampling calibration"

  - group: Faults
    update_interval: 30
    items:
      - name: "Grid Error"
        alt: GridErr
        rule: 1
        registers: [0x0BC1, 0x0BC0]
        icon: "mdi:alert-circle"
        lookup:
          - key: 0
            value: "No fault"
          - key: 1
            value: "C01 - GridLossFault"
          - key: 2
            value: "C02 - GridVoltUnbalanFault"
          - key: 4
            value: "C03 - GridInstVoltHighFault"
          - key: 8
            value: "C04 - Grid10MinOverFault"
          - key: 16
            value: "C05 - GridOverVoltFault"
          - key: 32
            value: "C06 - GridUnderVoltFault"
          - key: 64
            value: "C07 - GridOverLineVoltFault"
          - key: 128
            value: "C08 - GridUnderLineVoltFault"
          - key: 256
            value: "C09 - GridOverFreqFault"
          - key: 512
            value: "C10 - GridUnderFreqFault"
